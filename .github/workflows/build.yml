name: Compilar Breakout SDL2 Portable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar entorno MSVC (C++)
      uses: ilammy/msvc-dev-cmd@v1

    - name: Descargar SDL2 (Windows x64)
      # Usamos la 2.30.2 que es estable y compatible con x64
      run: |
        Invoke-WebRequest -Uri https://github.com/libsdl-org/SDL/releases/download/release-2.30.2/SDL2-devel-2.30.2-VC.zip -OutFile sdl2.zip
        Expand-Archive sdl2.zip -DestinationPath sdl2_dev
      shell: pwsh

    - name: Compilar Breakout
      # 1. /I añade las cabeceras
      # 2. /MT incluye las librerías estándar dentro del exe
      # 3. /link conecta con las librerías de SDL2
      run: |
        cl.exe /EHsc /MT /Isdl2_dev\SDL2-2.30.2\include src/main.cpp /Fe:Breakout.exe /link /LIBPATH:sdl2_dev\SDL2-2.30.2\lib\x64 SDL2.lib SDL2main.lib shell32.lib /SUBSYSTEM:WINDOWS
      shell: cmd

    - name: Empaquetar Juego Portable
      # Creamos la carpeta que el usuario final va a descargar
      run: |
        mkdir Breakout_Portable
        move Breakout.exe Breakout_Portable\
        copy sdl2_dev\SDL2-2.30.2\lib\x64\SDL2.dll Breakout_Portable\
      shell: cmd

    - name: Subir Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: Breakout-Windows-x64
        path: Breakout_Portable\

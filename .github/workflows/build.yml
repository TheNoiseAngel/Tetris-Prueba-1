name: Build & Package (Win/Linux)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-SDL2
          zip

    - name: Build executable
      shell: msys2 {0}
      run: |
        mkdir -p bin
        g++ src/main.cpp -o bin/TetrisBreakout.exe -lmingw32 -lSDL2main -lSDL2

    - name: Copy SDL2.dll
      shell: msys2 {0}
      run: |
        cp /mingw64/bin/SDL2.dll bin/

    - name: Package portable ZIP
      shell: msys2 {0}
      run: |
        zip -r Tetris-Prueba-1_windows-portable.zip bin/

    - uses: actions/upload-artifact@v4
      with:
        name: tetris-portable-windows
        path: Tetris-Prueba-1_windows-portable.zip

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev zip build-essential

    - name: Build executable
      run: |
        mkdir -p bin
        g++ src/main.cpp -o bin/TetrisBreakout -lSDL2

    - name: Package portable ZIP
      run: |
        zip -r Tetris-Prueba-1_linux-portable.zip bin/

    - uses: actions/upload-artifact@v4
      with:
        name: tetris-portable-linux
        path: Tetris-Prueba-1_linux-portable.zip
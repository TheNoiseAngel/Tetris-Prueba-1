name: Build & Package Portable Windows SDL2 Game

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: actions/checkout@v4

    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-SDL2
          zip

    - name: Build executable
      run: |
        mkdir -p bin
        g++ src/main.cpp -o bin/TetrisBreakout.exe -lmingw32 -lSDL2main -lSDL2

    - name: Copy SDL2.dll
      run: |
        cp /mingw64/bin/SDL2.dll bin/

    - name: Copy MinGW runtime DLLs
      run: |
        cp /mingw64/bin/libwinpthread-1.dll bin/
        cp /mingw64/bin/libstdc++-6.dll bin/
        cp /mingw64/bin/libgcc_s_seh-1.dll bin/

    - name: Package ZIP
      run: |
        cd bin
        zip -r ../Tetris-Prueba-1_windows-portable.zip *

    - uses: actions/upload-artifact@v4
      with:
        name: tetris-portable-windows
        path: Tetris-Prueba-1_windows-portable.zip